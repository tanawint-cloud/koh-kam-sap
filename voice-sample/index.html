<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>เทียบเสียงไทย · เกาะคำศัพท์</title>
<style>
  :root{--bg:#FBF6EE;--card:#fff;--ink:#123B48;--soft:#547079;--line:#EDE3D4;--coral:#EF6461;--teal:#149E92;}
  @media(prefers-color-scheme:dark){:root{--bg:#0C242C;--card:#123138;--ink:#EAF5F2;--soft:#9DBBC1;--line:#20505A;--coral:#FF7E7A;--teal:#2FC0B1;}}
  *{box-sizing:border-box} body{margin:0;font-family:-apple-system,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);padding:22px 16px 50px;line-height:1.5}
  .wrap{max-width:560px;margin:0 auto}
  h1{font-size:22px;margin:0 0 4px} p.sub{color:var(--soft);font-size:14px;margin:0 0 20px}
  .row{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:12px}
  .th{font-size:17px;font-weight:700;margin-bottom:10px}
  .btns{display:flex;gap:10px;flex-wrap:wrap}
  button{flex:1;min-width:150px;border:1.5px solid var(--line);background:var(--bg);color:var(--ink);border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;justify-content:center}
  button.new{border-color:var(--teal);color:var(--teal)}
  button.old{border-color:var(--soft);color:var(--soft)}
  button:active{transform:scale(.98)}
  .tag{font-size:11px;font-weight:800;letter-spacing:.03em}
  .note{background:var(--card);border:1.5px dashed var(--line);border-radius:14px;padding:14px 16px;color:var(--soft);font-size:13.5px;margin-top:18px}
</style>
</head>
<body>
<div class="wrap">
  <h1>🔊 เทียบเสียงไทย</h1>
  <p class="sub">แตะฟังเทียบ: <b style="color:var(--soft)">เสียงเดิม (macOS)</b> กับ <b style="color:var(--teal)">เสียงใหม่ (Google)</b> — อันไหนฟังเป็นธรรมชาติกว่ากัน?</p>
  <div id="list"></div>
  <div class="note">💡 ถ้าเสียงใหม่ (Google) ฟังโอเคกว่า บอกพี่วินได้เลย เดี๋ยวจะอัดใหม่ให้ครบทั้ง 217 คำ · ถ้ายังไม่ถูกใจ มีทางใช้เสียง AI ระดับสูงกว่านี้ (ElevenLabs/Azure) หรือเสียงคนจริงได้อีก</div>
</div>
<script>
const items=[
  {th:"แมว (cat)", old:"../audio/th/cat_d077f2.m4a", nw:"s1_cat.mp3"},
  {th:"หนูรักครอบครัวของหนูค่ะ (I love my family.)", old:"../audio/th/i_love_my_family_02c506.m4a", nw:"s2_family.mp3"},
  {th:"ราคาเท่าไหร่คะ (How much is it?)", old:"../audio/th/how_much_is_it_6ca752.m4a", nw:"s3_price.mp3"},
  {th:"ก๋วยเตี๋ยว (noodles)", old:"../audio/th/noodles_d7eba3.m4a", nw:"s4_noodles.mp3"},
  {th:"หิวน้ำ (thirsty)", old:"../audio/th/thirsty_52def7.m4a", nw:"s5_thirsty.mp3"},
];
const player=new Audio();
function play(src){ player.pause(); player.src=src; player.play().catch(()=>{}); }
document.getElementById('list').innerHTML=items.map((it,i)=>`
  <div class="row"><div class="th">${it.th}</div>
    <div class="btns">
      <button class="old" onclick="play('${it.old}')"><span class="tag">เดิม</span> 🔊 macOS</button>
      <button class="new" onclick="play('${it.nw}')"><span class="tag">ใหม่</span> 🔊 Google</button>
    </div></div>`).join('');
</script>
</body>
</html>
